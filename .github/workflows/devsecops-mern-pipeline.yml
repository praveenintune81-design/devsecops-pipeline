name: DevSecOps Secure Pipeline

# when run the pipeline 
on:
  push:
    branches:
      - main     # when code push to main branch pipeline is running 

  pull_request:
    branches:
      - main     # PR create then check security 


jobs:

# ---------------------------------------
# JOB 1 : Checkout Code
# ---------------------------------------

  checkout-code:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

# ---------------------------------------
# JOB 2 : Static Code Analysis (CodeQL)
# ---------------------------------------

  codeql-analysis:

    runs-on: ubuntu-latest

    needs: checkout-code   # when checkout code complited then run 
    steps:

      - name: Checkout Code

        uses: actions/checkout@v4


      - name: Initialize CodeQL

        uses: github/codeql-action/init@v3

        with:
          languages: javascript


      - name: Run CodeQL Analysis

        uses: github/codeql-action/analyze@v3


# ---------------------------------------
# JOB 3 : Secret Scanning
# ---------------------------------------

  secret-scan:

    runs-on: ubuntu-latest

    needs: checkout-code

    steps:

      - name: Checkout Code

        uses: actions/checkout@v4


      - name: Run Gitleaks Secret Scan

        uses: gitleaks/gitleaks-action@v2

# ---------------------------------------
# JOB 4 : Dependency Vulnerability Scan
# ---------------------------------------

  dependency-scan:

    runs-on: ubuntu-latest

    needs: checkout-code

    steps:

      - name: Checkout Code

        uses: actions/checkout@v4


      - name: Install Node Dependencies

        run: npm install


      - name: Run Dependency Security Scan

        run: npm audit --audit-level=high


# ---------------------------------------
# JOB 5 : Dockerfile Security Scan
# ---------------------------------------

  dockerfile-scan:

    runs-on: ubuntu-latest

    needs: checkout-code

    steps:

      - name: Checkout Code

        uses: actions/checkout@v4


      - name: Run Hadolint Dockerfile Scan

        uses: hadolint/hadolint-action@v3

        with:
          dockerfile: backend/Dockerfile

# ---------------------------------------
# JOB 6 : Build Docker Image
# ---------------------------------------

  build-image:

    runs-on: ubuntu-latest

    needs:
      - dependency-scan
      - dockerfile-scan

    steps:

      - name: Checkout Code

        uses: actions/checkout@v4


      - name: Build Docker Image

        run: docker build -t task-manager-backend ./backend

# ---------------------------------------
# JOB 7 : Container Image Scan
# ---------------------------------------

  trivy-scan:

    runs-on: ubuntu-latest

    needs: build-image

    steps:

      - name: Run Trivy Vulnerability Scan

        uses: aquasecurity/trivy-action@master

        with:
          image-ref: task-manager-backend


# ---------------------------------------
# JOB 8 : Deploy Container
# ---------------------------------------

  deploy:

    runs-on: ubuntu-latest

    needs: trivy-scan

    steps:

      - name: Deploy Docker Container

        run: |

          docker run -d -p 80:3000 task-manager-backend
