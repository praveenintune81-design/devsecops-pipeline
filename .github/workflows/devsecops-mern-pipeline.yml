name: DevSecOps Secure Pipeline

# This pipeline runs automatically when code is pushed to the main branch
on:
  push:
    branches:
      - main


# Permissions required for CodeQL security scanning
permissions:
  contents: read
  security-events: write


jobs:

# ------------------------------------------------
# STAGE 1 — CHECKOUT CODE
# ------------------------------------------------

  checkout-code:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

        # This step downloads the repository code
        # to the GitHub Actions runner machine
        # so that the pipeline can analyze and build it



# ------------------------------------------------
# STAGE 2 — STATIC CODE ANALYSIS (CODEQL)
# ------------------------------------------------

  codeql-analysis:

    runs-on: ubuntu-latest

    needs: checkout-code

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

        # Code must be checked out again because each job runs on a fresh runner


      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

        # CodeQL is GitHub's security analysis tool
        # It detects vulnerabilities such as:
        # SQL Injection
        # Cross Site Scripting (XSS)
        # insecure coding patterns


      - name: Autobuild Project
        uses: github/codeql-action/autobuild@v3

        # Autobuild attempts to automatically build the project
        # so CodeQL can analyze the compiled source code


      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

        # This step performs the actual security analysis



# ------------------------------------------------
# STAGE 3 — SECRET SCANNING
# ------------------------------------------------

  secret-scan:

    runs-on: ubuntu-latest

    needs: checkout-code

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

        # Gitleaks scans the repository for exposed secrets
        # Examples:
        # AWS Access Keys
        # API Tokens
        # Hardcoded passwords

        # If a secret is detected, the pipeline can fail



# ------------------------------------------------
# STAGE 4 — DEPENDENCY VULNERABILITY SCAN
# ------------------------------------------------

  dependency-scan:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Install Node Dependencies
        run: npm install
        working-directory: ${{ matrix.service }}

        # Installs project dependencies for backend and frontend


      - name: Run npm Audit
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.service }}

        # npm audit checks for known vulnerabilities
        # in installed npm packages



# ------------------------------------------------
# STAGE 5 — DOCKERFILE SECURITY SCAN
# ------------------------------------------------

  dockerfile-scan:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Run Hadolint
        uses: hadolint/hadolint-action@v2
        with:
          dockerfile: ${{ matrix.service }}/Dockerfile

        # Hadolint analyzes Dockerfiles and enforces best practices
        # Example checks:
        # Avoid using latest tag
        # Avoid running containers as root
        # Reduce unnecessary layers



# ------------------------------------------------
# STAGE 6 — BUILD DOCKER IMAGE
# ------------------------------------------------

  build-image:

    runs-on: ubuntu-latest

    needs:
      - dependency-scan
      - dockerfile-scan

    strategy:
      matrix:
        service: [backend, frontend]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Build Docker Image
        run: docker build -t ${{ matrix.service }} ./${{ matrix.service }}

        # Builds Docker images for backend and frontend services



# ------------------------------------------------
# STAGE 7 — CONTAINER IMAGE SECURITY SCAN
# ------------------------------------------------

  trivy-scan:

    runs-on: ubuntu-latest

    needs: build-image

    strategy:
      matrix:
        service: [backend, frontend]

    steps:

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}

        # Trivy scans Docker images for vulnerabilities
        # It checks:
        # Operating system packages
        # Installed libraries
        # Known CVEs (Common Vulnerabilities and Exposures)



# ------------------------------------------------
# STAGE 8 — DEPLOY APPLICATION
# ------------------------------------------------

  deploy:

    runs-on: ubuntu-latest

    needs: trivy-scan

    steps:

      - name: Deploy Backend Container
        run: docker run -d -p 80:3000 backend

        # This step runs the backend container
        # mapping port 80 of the server to port 3000 inside the container
