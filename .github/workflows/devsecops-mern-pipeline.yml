name: DevSecOps Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:

  checkout-code:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        # Download project code


  secret-scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        # Detect leaked secrets


  dependency-scan:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install
        working-directory: ${{ matrix.service }}

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.service }}
        # Scan vulnerable npm packages


  dockerfile-scan:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hadolint
        run: docker run --rm -i hadolint/hadolint < ${{ matrix.service }}/Dockerfile
        # Dockerfile security scan


  build:

    runs-on: ubuntu-latest

    needs:
      - dependency-scan
      - dockerfile-scan

    strategy:
      matrix:
        service: [backend, frontend]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ matrix.service }} ./${{ matrix.service }}
        # Build Docker image


  trivy-scan:

    runs-on: ubuntu-latest

    needs: build

    strategy:
      matrix:
        service: [backend, frontend]

    steps:

      - name: Scan Docker Image with Trivy

        uses: aquasecurity/trivy-action@0.24.0

        with:
          image-ref: ${{ matrix.service }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH

        # Trivy scans Docker images for vulnerabilities
        # format: table shows readable scan output
        # exit-code: 0 prevents pipeline failure if vulnerabilities exist
        # ignore-unfixed ignores vulnerabilities without available fixes
        # severity filters high and critical vulnerabilities
